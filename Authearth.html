<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>jack r — authearth</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh; background: #080808;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      font-family: 'DM Mono', monospace; overflow: hidden;
    }
    body::before {
      content: ''; position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.04; pointer-events: none; z-index: 0;
    }

    /* ── LOCK SCREEN ── */
    #lock {
      position: fixed; inset: 0; z-index: 10;
      display: flex; align-items: center; justify-content: center;
      transition: opacity 0.5s ease;
    }
    #lock.hidden { opacity: 0; pointer-events: none; }

    .lock-window {
      width: 340px;
      background: rgba(15,15,15,0.92);
      border: 1px solid #2a2a2a;
      border-radius: 14px;
      overflow: hidden;
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      box-shadow: 0 8px 40px rgba(0,0,0,0.7);
    }
    .titlebar {
      background: rgba(20,20,20,0.95);
      border-bottom: 1px solid #1e1e1e;
      padding: 11px 16px;
      display: flex; align-items: center; gap: 10px;
      user-select: none;
    }
    .lights { display: flex; gap: 7px; }
    .light {
      width: 13px; height: 13px; border-radius: 50%;
      transition: filter 0.15s, transform 0.15s;
    }
    .light.red    { background: #ff5f57; box-shadow: 0 0 6px rgba(255,95,87,0.5); }
    .light.yellow { background: #febc2e; box-shadow: 0 0 6px rgba(254,188,46,0.5); }
    .light.green  { background: #28c840; box-shadow: 0 0 6px rgba(40,200,64,0.5); }
    .titlebar-label { font-size: 0.62rem; letter-spacing: 0.14em; text-transform: uppercase; color: #2e2e2e; margin-left: 2px; }

    .lock-body { padding: 24px; display: flex; flex-direction: column; gap: 14px; }
    .lock-label { font-size: 0.58rem; letter-spacing: 0.2em; text-transform: uppercase; color: #333; }
    .lock-input {
      background: rgba(255,255,255,0.03);
      border: 1px solid #222;
      border-radius: 8px;
      padding: 10px 14px;
      font-family: 'DM Mono', monospace;
      font-size: 0.78rem;
      color: #888;
      letter-spacing: 0.1em;
      outline: none;
      width: 100%;
      transition: border-color 0.2s;
    }
    .lock-input:focus { border-color: #333; color: #aaa; }
    .lock-input.error { border-color: #ff5f57; color: #ff5f57; }
    .lock-hint { font-size: 0.55rem; letter-spacing: 0.15em; text-transform: uppercase; color: #222; }

    /* ── PROXY ── */
    #proxy {
      position: fixed; inset: 0; z-index: 5;
      display: flex; flex-direction: column;
      opacity: 0; pointer-events: none;
      transition: opacity 0.5s ease 0.3s;
    }
    #proxy.visible { opacity: 1; pointer-events: all; }

    /* top bar */
    .proxy-bar {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .url-bar {
      background: rgba(18,18,18,0.9);
      border: 1px solid #242424;
      border-radius: 999px;
      padding: 6px 6px 6px 18px;
      display: flex; align-items: center; gap: 8px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      width: 360px;
    }
    .url-input {
      flex: 1; background: none; border: none; outline: none;
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem; letter-spacing: 0.08em; color: #666;
    }
    .url-input::placeholder { color: #333; }
    .url-go {
      background: rgba(255,255,255,0.05);
      border: 1px solid #2a2a2a;
      border-radius: 999px;
      padding: 5px 14px;
      font-family: 'DM Mono', monospace;
      font-size: 0.58rem; letter-spacing: 0.12em; text-transform: uppercase;
      color: #555; cursor: pointer; transition: color 0.2s, border-color 0.2s;
    }
    .url-go:hover { color: #aaa; border-color: #444; }

    /* nav */
    .bottom-nav {
      background: rgba(18,18,18,0.85);
      border: 1px solid #242424;
      border-radius: 999px;
      padding: 5px;
      display: flex; align-items: center; gap: 2px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      position: relative;
    }
    .nav-bubble {
      position: absolute; top: 5px; height: calc(100% - 10px);
      background: #1f1f1f; border: 1px solid #333; border-radius: 999px;
      transition: left 0.38s cubic-bezier(0.4,0,0.2,1), width 0.38s cubic-bezier(0.4,0,0.2,1);
      pointer-events: none; z-index: 0;
    }
    .nav-btn {
      position: relative; z-index: 1;
      width: 42px; height: 34px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 999px; border: none; background: none;
      cursor: pointer; color: #555; transition: color 0.25s;
    }
    .nav-btn:hover { color: #aaa; }
    .nav-btn.active { color: #e0e0e0; }
    .nav-btn svg { width: 16px; height: 16px; pointer-events: none; }

    /* iframe */
    #frame {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      border: none; z-index: 1;
      background: #080808;
    }

    /* credits overlay */
    #credits {
      position: fixed; inset: 0; z-index: 25;
      display: flex; align-items: center; justify-content: center;
      background: rgba(8,8,8,0.75); backdrop-filter: blur(6px);
      opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
    }
    #credits.visible { opacity: 1; pointer-events: all; }
    .credits-win {
      width: 280px;
      background: rgba(15,15,15,0.96);
      border: 1px solid #2a2a2a; border-radius: 14px; overflow: hidden;
      box-shadow: 0 8px 40px rgba(0,0,0,0.8);
    }
    .credits-bar {
      background: rgba(20,20,20,0.95); border-bottom: 1px solid #1e1e1e;
      padding: 11px 16px; display: flex; align-items: center; justify-content: space-between;
    }
    .credits-close {
      font-size: 0.58rem; letter-spacing: 0.15em; text-transform: uppercase;
      color: #333; background: none; border: none; cursor: pointer;
      font-family: 'DM Mono', monospace; transition: color 0.2s;
    }
    .credits-close:hover { color: #888; }
    .credits-body { padding: 20px 24px; }
    .credits-name { font-size: 1rem; font-weight: 500; color: #e0e0e0; letter-spacing: 0.05em; margin-bottom: 6px; }
    .credits-sub { font-size: 0.62rem; color: #333; letter-spacing: 0.12em; }
  </style>
</head>
<body>

  <!-- LOCK -->
  <div id="lock">
    <div class="lock-window">
      <div class="titlebar">
        <div class="lights">
          <div class="light red"></div>
          <div class="light yellow"></div>
          <div class="light green"></div>
        </div>
        <span class="titlebar-label">authearth</span>
      </div>
      <div class="lock-body">
        <div class="lock-label">access key</div>
        <input class="lock-input" id="keyInput" type="password" placeholder="enter key..." autocomplete="off" autofocus/>
        <div class="lock-hint">enter your access key and press enter</div>
      </div>
    </div>
  </div>

  <!-- PROXY -->
  <div id="proxy">
    <iframe id="frame" src="https://duckduckgo.com" sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-top-navigation"></iframe>

    <div class="proxy-bar">
      <div class="url-bar">
        <input class="url-input" id="urlInput" type="text" placeholder="search or enter url..."/>
        <button class="url-go" id="urlGo">go</button>
      </div>

      <div class="bottom-nav" id="bottomNav">
        <div class="nav-bubble" id="navBubble"></div>

        <!-- browser -->
        <button class="nav-btn active" id="btnBrowser" title="browser">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
          </svg>
        </button>

        <!-- games -->
        <button class="nav-btn" id="btnGames" title="games">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="6" width="20" height="12" rx="3"/>
            <path d="M6 12h4M8 10v4M15 11h.01M17 13h.01"/>
          </svg>
        </button>

        <!-- file / proxy -->
        <button class="nav-btn" id="btnFile" title="open proxy">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
          </svg>
        </button>

        <!-- credits -->
        <button class="nav-btn" id="btnCredits" title="credits">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="8" x2="12" y2="12"/>
            <line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <!-- CREDITS -->
  <div id="credits">
    <div class="credits-win">
      <div class="credits-bar">
        <div class="lights">
          <div class="light red"></div>
          <div class="light yellow"></div>
          <div class="light green"></div>
        </div>
        <button class="credits-close" id="creditsClose">close</button>
      </div>
      <div class="credits-body">
        <div class="credits-name">jack r</div>
        <div class="credits-sub">made by jack &mdash; all rights reserved</div>
      </div>
    </div>
  </div>

  <script>
    // ── KEY GATE ──
    const keyInput = document.getElementById('keyInput');
    const lock     = document.getElementById('lock');
    const proxy    = document.getElementById('proxy');

    keyInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') checkKey();
    });

    function checkKey() {
      if (keyInput.value === 'gabecrushlota') {
        lock.classList.add('hidden');
        proxy.classList.add('visible');
      } else {
        keyInput.classList.add('error');
        keyInput.value = '';
        keyInput.placeholder = 'wrong key...';
        setTimeout(() => {
          keyInput.classList.remove('error');
          keyInput.placeholder = 'enter key...';
        }, 1500);
      }
    }

    // ── NAV BUBBLE ──
    const bottomNav = document.getElementById('bottomNav');
    const navBubble = document.getElementById('navBubble');
    const navBtns   = bottomNav.querySelectorAll('.nav-btn');

    function moveBubble(el) {
      const nr = bottomNav.getBoundingClientRect();
      const er = el.getBoundingClientRect();
      navBubble.style.left  = (er.left - nr.left) + 'px';
      navBubble.style.width = er.width + 'px';
    }

    function setActive(btn) {
      navBtns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      moveBubble(btn);
    }

    window.addEventListener('DOMContentLoaded', () => {
      const active = bottomNav.querySelector('.nav-btn.active');
      if (active) {
        navBubble.style.transition = 'none';
        moveBubble(active);
        requestAnimationFrame(() => { navBubble.style.transition = ''; });
      }
    });

    navBtns.forEach(btn => {
      btn.addEventListener('mouseenter', () => moveBubble(btn));
      btn.addEventListener('mouseleave', () => {
        const active = bottomNav.querySelector('.nav-btn.active');
        if (active) moveBubble(active);
      });
    });

    // ── BUTTON ACTIONS ──
    const frame = document.getElementById('frame');

    document.getElementById('btnBrowser').addEventListener('click', () => {
      setActive(document.getElementById('btnBrowser'));
      frame.src = 'https://duckduckgo.com';
    });

    document.getElementById('btnGames').addEventListener('click', () => {
      setActive(document.getElementById('btnGames'));
    });

    document.getElementById('btnFile').addEventListener('click', () => {
      setActive(document.getElementById('btnFile'));
      fetch('https://cdn.jsdelivr.net/gh/bubbls/ugs-singlefile@main/AASINGLEFILE.html?t=' + Date.now())
        .then(r => r.text())
        .then(t => {
          var w = window.open('about:blank', '_blank');
          if (w) { w.document.open(); w.document.write(t); w.document.close(); }
        });
    });

    document.getElementById('btnCredits').addEventListener('click', () => {
      setActive(document.getElementById('btnCredits'));
      document.getElementById('credits').classList.add('visible');
    });

    document.getElementById('creditsClose').addEventListener('click', () => {
      document.getElementById('credits').classList.remove('visible');
      setActive(document.getElementById('btnBrowser'));
    });

    // ── URL BAR ──
    document.getElementById('urlGo').addEventListener('click', goToUrl);
    document.getElementById('urlInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') goToUrl();
    });

    function goToUrl() {
      let val = document.getElementById('urlInput').value.trim();
      if (!val) return;
      if (!val.startsWith('http')) val = 'https://' + val;
      frame.src = val;
    }
  </script>
</body>
</html>
