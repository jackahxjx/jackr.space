<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>jack r</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #080808;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'DM Mono', monospace;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.045;
      pointer-events: none;
      z-index: 0;
    }

    .scene {
      z-index: 1;
      margin-bottom: 2.2rem;
    }

    .window {
      width: 320px;
      background: #0f0f0f;
      border: 1px solid #252525;
      border-radius: 13px;
      overflow: hidden;
      box-shadow: 0 0 0 0.5px #000, 0 24px 60px rgba(0,0,0,0.85);
      animation: fadeIn 0.5s cubic-bezier(.22,.68,0,1.2) both;
      /* tilt applied via JS transform */
      transform: perspective(700px) rotateX(0deg) rotateY(0deg) scale(1);
      transition: box-shadow 0.15s ease;
      will-change: transform;
    }

    .titlebar {
      background: #161616;
      border-bottom: 1px solid #1e1e1e;
      padding: 11px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      user-select: none;
    }

    .titlebar-label {
      font-size: 0.62rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: #333;
    }

    .lights { display: flex; gap: 6px; }
    .light {
      width: 12px; height: 12px;
      border-radius: 50%;
      transition: filter 0.15s, transform 0.15s;
    }
    .light:hover { transform: scale(1.2); }
    .light.red    { background: #ff5f57; box-shadow: 0 0 6px rgba(255,95,87,0.5); }
    .light.yellow { background: #febc2e; box-shadow: 0 0 6px rgba(254,188,46,0.5); }
    .light.green  { background: #28c840; box-shadow: 0 0 6px rgba(40,200,64,0.5); }
    .light.red:hover    { box-shadow: 0 0 14px rgba(255,95,87,1); filter: brightness(1.2); }
    .light.yellow:hover { box-shadow: 0 0 14px rgba(254,188,46,1); filter: brightness(1.2); }
    .light.green:hover  { box-shadow: 0 0 14px rgba(40,200,64,1);  filter: brightness(1.2); }

    .card-body {
      padding: 24px 20px 22px;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 16px;
    }

    .avatar {
      width: 72px; height: 72px;
      border-radius: 50%;
      background: #1a1a1a;
      border: 1px solid #282828;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      filter: grayscale(1);
      box-shadow: 0 0 0 3px #111, 0 0 20px rgba(255,255,255,0.04);
    }
    .avatar svg { width: 58%; opacity: 0.28; }

    .info {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 6px;
    }

    .name {
      font-size: 1.1rem;
      font-weight: 500;
      color: #e2e2e2;
      letter-spacing: 0.06em;
      text-shadow: 0 0 20px rgba(255,255,255,0.1);
    }

    .meta {
      font-size: 0.64rem;
      color: #383838;
      letter-spacing: 0.08em;
      line-height: 1.6;
    }

    .spacer { height: 14px; }

    .divider {
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, transparent, #1e1e1e, transparent);
    }

    .footer {
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 7px;
    }
    .dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: #fff;
      opacity: 0.15;
      animation: blink 2.5s infinite;
    }
    .footer-text {
      font-size: 0.58rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #2d2d2d;
    }

    .credit {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.58rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #252525;
      white-space: nowrap;
      z-index: 10;
      transition: color 0.3s;
    }
    .credit:hover { color: #555; }
    .heart { color: #fff; opacity: 0.4; }

    @keyframes fadeIn {
      from { opacity: 0; transform: perspective(700px) translateY(14px) scale(0.97); }
      to   { opacity: 1; transform: perspective(700px) translateY(0) scale(1); }
    }
    @keyframes blink {
      0%, 100% { opacity: 0.1; }
      50%       { opacity: 0.45; }
    }
  </style>
</head>
<body>

  <div class="scene">
    <div class="window" id="card">

      <div class="titlebar">
        <span class="titlebar-label">jack r</span>
        <div class="lights">
          <div class="light red"></div>
          <div class="light yellow"></div>
          <div class="light green"></div>
        </div>
      </div>

      <div class="card-body">
        <div class="avatar">
          <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="50" cy="36" r="22" fill="#888"/>
            <path d="M8 95 Q8 66 50 66 Q92 66 92 95" fill="#888"/>
          </svg>
        </div>
        <div class="info">
          <div class="name">jack r</div>
          <div class="meta">est. &mdash; mar 24, 2026</div>
        </div>
        <div class="spacer"></div>
      </div>

      <div class="divider"></div>

      <div class="footer">
        <div class="dot"></div>
        <span class="footer-text">online</span>
      </div>

    </div>
  </div>

  <div class="credit">made with <span class="heart">&lt;3</span> by jack</div>

  <script>
    const card = document.getElementById('card');
    const TILT = 25;
    let targetX = 0, targetY = 0, curX = 0, curY = 0, inside = false;

    // listen directly on the card element
    card.addEventListener('mousemove', function(e) {
      const r = this.getBoundingClientRect();
      const px = (e.clientX - r.left) / r.width;   // 0 → 1 left to right
      const py = (e.clientY - r.top)  / r.height;  // 0 → 1 top to bottom
      targetY = (px - 0.5) * TILT;   // right side → positive Y rotation
      targetX = (0.5 - py) * TILT;   // top → positive X rotation (tilt back)
    });

    card.addEventListener('mouseenter', () => { inside = true; });
    card.addEventListener('mouseleave', () => {
      inside = false;
      targetX = 0;
      targetY = 0;
    });

    function loop() {
      curX += (targetX - curX) * 0.12;
      curY += (targetY - curY) * 0.12;

      const s = inside ? 1.04 : 1;
      card.style.transform =
        `perspective(700px) rotateX(${curX}deg) rotateY(${curY}deg) scale(${s})`;

      if (inside) {
        card.style.boxShadow = `
          0 0 0 1px #2a2a2a,
          ${curY * 2}px ${-curX * 2}px 50px rgba(255,255,255,0.05),
          0 30px 80px rgba(0,0,0,0.9)
        `;
      } else {
        card.style.boxShadow = '0 0 0 0.5px #000, 0 24px 60px rgba(0,0,0,0.85)';
      }

      requestAnimationFrame(loop);
    }
    loop();
  </script>
</body>
</html>
