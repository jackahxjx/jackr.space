<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>jack r</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #080808;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'DM Mono', monospace;
      overflow: hidden;
      cursor: none;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.045;
      pointer-events: none;
      z-index: 0;
    }

    #cur {
      position: fixed;
      width: 10px; height: 10px;
      background: #fff;
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%,-50%);
      mix-blend-mode: difference;
    }
    #cur-ring {
      position: fixed;
      width: 28px; height: 28px;
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9998;
      transform: translate(-50%,-50%);
    }

    .scene {
      perspective: 800px;
      perspective-origin: 50% 50%;
      z-index: 1;
      margin-bottom: 2.2rem;
    }

    .window {
      width: 320px;
      background: #0f0f0f;
      border: 1px solid #252525;
      border-radius: 13px;
      overflow: hidden;
      will-change: transform;
      box-shadow: 0 0 0 0.5px #000, 0 24px 60px rgba(0,0,0,0.85);
      animation: fadeIn 0.5s cubic-bezier(.22,.68,0,1.2) both;
      cursor: none;
    }

    .titlebar {
      background: #161616;
      border-bottom: 1px solid #1e1e1e;
      padding: 11px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      user-select: none;
    }

    .titlebar-label {
      font-size: 0.62rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: #333;
    }

    .lights {
      display: flex;
      gap: 6px;
    }
    .light {
      width: 12px; height: 12px;
      border-radius: 50%;
      cursor: none;
      transition: filter 0.15s, transform 0.15s;
    }
    .light:hover { transform: scale(1.2); }
    .light.red    { background: #ff5f57; box-shadow: 0 0 6px rgba(255,95,87,0.5); }
    .light.yellow { background: #febc2e; box-shadow: 0 0 6px rgba(254,188,46,0.5); }
    .light.green  { background: #28c840; box-shadow: 0 0 6px rgba(40,200,64,0.5); }
    .light.red:hover    { box-shadow: 0 0 14px rgba(255,95,87,1); filter: brightness(1.2); }
    .light.yellow:hover { box-shadow: 0 0 14px rgba(254,188,46,1); filter: brightness(1.2); }
    .light.green:hover  { box-shadow: 0 0 14px rgba(40,200,64,1);  filter: brightness(1.2); }

    .card-body {
      padding: 24px 20px 22px;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 16px;
    }

    .avatar {
      width: 72px; height: 72px;
      border-radius: 50%;
      background: #1a1a1a;
      border: 1px solid #282828;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      filter: grayscale(1);
      box-shadow: 0 0 0 3px #111, 0 0 20px rgba(255,255,255,0.04);
    }
    .avatar svg { width: 58%; opacity: 0.28; }

    .info {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 6px;
    }

    .name {
      font-size: 1.1rem;
      font-weight: 500;
      color: #e2e2e2;
      letter-spacing: 0.06em;
      text-shadow: 0 0 20px rgba(255,255,255,0.1);
    }

    .meta {
      font-size: 0.64rem;
      color: #383838;
      letter-spacing: 0.08em;
      line-height: 1.6;
    }

    .spacer { height: 14px; }

    .divider {
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, transparent, #1e1e1e, transparent);
    }

    .footer {
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 7px;
    }
    .dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: #fff;
      opacity: 0.15;
      box-shadow: 0 0 5px rgba(255,255,255,0.3);
      animation: blink 2.5s infinite;
    }
    .footer-text {
      font-size: 0.58rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #2d2d2d;
    }

    .credit {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.58rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #252525;
      white-space: nowrap;
      z-index: 10;
      transition: color 0.3s;
    }
    .credit:hover { color: #555; }
    .heart { color: #fff; opacity: 0.4; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(14px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes blink {
      0%, 100% { opacity: 0.1; }
      50%       { opacity: 0.45; }
    }
  </style>
</head>
<body>

  <div id="cur"></div>
  <div id="cur-ring"></div>

  <div class="scene">
    <div class="window" id="window">

      <div class="titlebar">
        <span class="titlebar-label">jack r</span>
        <div class="lights">
          <div class="light red"></div>
          <div class="light yellow"></div>
          <div class="light green"></div>
        </div>
      </div>

      <div class="card-body">
        <div class="avatar">
          <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="50" cy="36" r="22" fill="#888"/>
            <path d="M8 95 Q8 66 50 66 Q92 66 92 95" fill="#888"/>
          </svg>
        </div>
        <div class="info">
          <div class="name">jack r</div>
          <div class="meta">est. &mdash; mar 24, 2026</div>
        </div>
        <div class="spacer"></div>
      </div>

      <div class="divider"></div>

      <div class="footer">
        <div class="dot"></div>
        <span class="footer-text">online</span>
      </div>

    </div>
  </div>

  <div class="credit">made with <span class="heart">&lt;3</span> by jack</div>

  <script>
    const cur  = document.getElementById('cur');
    const ring = document.getElementById('cur-ring');
    let mx = 0, my = 0, rx = 0, ry = 0;

    document.addEventListener('mousemove', e => {
      mx = e.clientX;
      my = e.clientY;
      cur.style.left = mx + 'px';
      cur.style.top  = my + 'px';
    });

    (function ringLoop() {
      rx += (mx - rx) * 0.16;
      ry += (my - ry) * 0.16;
      ring.style.left = rx + 'px';
      ring.style.top  = ry + 'px';
      requestAnimationFrame(ringLoop);
    })();

    const card = document.getElementById('window');
    const TILT = 22;
    let tRX = 0, tRY = 0, cRX = 0, cRY = 0, hovered = false;

    document.addEventListener('mousemove', e => {
      if (!hovered) return;
      const rect = card.getBoundingClientRect();
      const nx = (e.clientX - rect.left) / rect.width  - 0.5;
      const ny = (e.clientY - rect.top)  / rect.height - 0.5;
      tRY =  nx * TILT;
      tRX = -ny * TILT;
    });

    card.addEventListener('mouseenter', () => { hovered = true; });
    card.addEventListener('mouseleave', () => {
      hovered = false;
      tRX = 0; tRY = 0;
    });

    (function tiltLoop() {
      cRX += (tRX - cRX) * 0.1;
      cRY += (tRY - cRY) * 0.1;
      const scale = hovered ? 1.03 : 1;
      card.style.transform =
        `perspective(800px) rotateX(${cRX}deg) rotateY(${cRY}deg) scale(${scale})`;
      if (hovered) {
        const sx = cRY * 1.8;
        const sy = -cRX * 1.8;
        card.style.boxShadow = `
          0 0 0 1px #2a2a2a,
          ${sx}px ${sy}px 50px rgba(255,255,255,0.06),
          0 36px 90px rgba(0,0,0,0.9)
        `;
      } else {
        card.style.boxShadow = '0 0 0 0.5px #000, 0 24px 60px rgba(0,0,0,0.85)';
      }
      requestAnimationFrame(tiltLoop);
    })();
  </script>
</body>
</html>
