<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>jack r</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/transitions.css"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #080808;
      display: flex;
      flex-direction: column;
      align-items: center;
      font-family: 'DM Mono', monospace;
      overflow: hidden;
    }

    #bg {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      z-index: 0; opacity: 0.35; filter: grayscale(1);
    }
    #overlay {
      position: fixed; inset: 0;
      background: rgba(8,8,8,0.55);
      z-index: 1; pointer-events: none;
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.04; pointer-events: none; z-index: 2;
    }

    nav {
      position: fixed;
      top: 1.25rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      background: rgba(18,18,18,0.85);
      border: 1px solid #242424;
      border-radius: 999px;
      padding: 5px;
      display: flex;
      align-items: center;
      gap: 2px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    .nav-bubble {
      position: absolute;
      top: 5px;
      height: calc(100% - 10px);
      background: #1f1f1f;
      border: 1px solid #333;
      border-radius: 999px;
      transition: left 0.38s cubic-bezier(0.4,0,0.2,1), width 0.38s cubic-bezier(0.4,0,0.2,1);
      pointer-events: none;
      z-index: 0;
    }
    .nav-item {
      position: relative; z-index: 1;
      padding: 7px 18px;
      font-size: 0.68rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #555;
      border-radius: 999px;
      white-space: nowrap;
      transition: color 0.25s;
      text-decoration: none;
      font-family: 'DM Mono', monospace;
      user-select: none;
    }
    .nav-item:hover { color: #aaa; }
    .nav-item.active { color: #e0e0e0; }

    .main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      z-index: 3;
    }

    .scene { perspective: 1000px; perspective-origin: 50% 50%; }
    .window {
      width: 480px; height: 310px;
      background: rgba(15,15,15,0.82);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid #2a2a2a;
      border-radius: 14px;
      overflow: hidden;
      transform-style: preserve-3d;
      box-shadow: 0 8px 20px rgba(0,0,0,0.6), 0 30px 70px rgba(0,0,0,0.5);
      will-change: transform;
      display: flex; flex-direction: column;
    }
    .titlebar {
      background: rgba(20,20,20,0.9);
      border-bottom: 1px solid #1e1e1e;
      padding: 11px 16px;
      display: flex; align-items: center; gap: 10px;
      user-select: none; flex-shrink: 0;
    }
    .lights { display: flex; gap: 7px; }
    .light {
      width: 13px; height: 13px;
      border-radius: 50%;
      transition: filter 0.15s, transform 0.15s; cursor: default;
    }
    .light:hover { transform: scale(1.2); }
    .light.red    { background: #ff5f57; box-shadow: 0 0 6px rgba(255,95,87,0.5); }
    .light.yellow { background: #febc2e; box-shadow: 0 0 6px rgba(254,188,46,0.5); cursor: pointer; }
    .light.green  { background: #28c840; box-shadow: 0 0 6px rgba(40,200,64,0.5); }
    .light.red:hover    { box-shadow: 0 0 14px rgba(255,95,87,1); filter: brightness(1.2); }
    .light.yellow:hover { box-shadow: 0 0 14px rgba(254,188,46,1); filter: brightness(1.3); }
    .light.green:hover  { box-shadow: 0 0 14px rgba(40,200,64,1); filter: brightness(1.2); }
    .titlebar-label {
      font-size: 0.62rem; letter-spacing: 0.14em;
      text-transform: uppercase; color: #2e2e2e; margin-left: 2px;
    }
    .card-body {
      flex: 1; padding: 22px 22px 18px;
      display: flex; flex-direction: row; align-items: center; gap: 20px;
    }
    .avatar {
      flex-shrink: 0; width: 72px; height: 72px;
      border-radius: 50%; background: #1a1a1a;
      border: 1px solid #2e2e2e; overflow: hidden;
      display: flex; align-items: center; justify-content: center;
      filter: grayscale(1); box-shadow: 0 0 0 3px #111;
      transform: translateZ(30px);
    }
    .avatar svg { width: 58%; opacity: 0.28; }
    .info { display: flex; flex-direction: column; gap: 7px; transform: translateZ(20px); }
    .name { font-size: 1.1rem; font-weight: 500; color: #e0e0e0; letter-spacing: 0.05em; }
    .meta { font-size: 0.65rem; color: #333; letter-spacing: 0.1em; line-height: 1.7; }
    .divider { width: 100%; height: 1px; background: linear-gradient(90deg, transparent, #1e1e1e, transparent); flex-shrink: 0; }

    .footer {
      padding: 10px 22px;
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0; transform: translateZ(10px);
    }
    .footer-left { display: flex; align-items: center; gap: 8px; }
    .dot { width: 5px; height: 5px; border-radius: 50%; background: #fff; opacity: 0.12; animation: blink 2.5s infinite; }
    .footer-text { font-size: 0.58rem; letter-spacing: 0.2em; text-transform: uppercase; color: #282828; }
    .footer-right { display: flex; align-items: center; gap: 14px; }
    .footer-tag {
      font-size: 0.55rem; letter-spacing: 0.16em; text-transform: uppercase;
      color: #2a2a2a; display: flex; align-items: center; gap: 5px;
    }
    .footer-tag span { color: #333; }

    .credit {
      position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
      font-size: 0.58rem; letter-spacing: 0.18em; text-transform: uppercase;
      color: #333; white-space: nowrap; z-index: 10; transition: color 0.3s;
    }
    .credit:hover { color: #777; }
    .heart { color: #fff; opacity: 0.35; }

    @keyframes blink { 0%,100% { opacity: 0.08; } 50% { opacity: 0.4; } }
  </style>
</head>
<body>
  <video autoplay muted loop playsinline id="bg">
    <source src="bg.mp4" type="video/mp4">
  </video>
  <div id="overlay"></div>

  <nav id="nav">
    <div class="nav-bubble" id="bubble"></div>
    <a class="nav-item active" href="/">Home</a>
    <a class="nav-item" href="/about-me">About Me</a>
    <a class="nav-item" href="/gallery">Gallery</a>
  </nav>

  <div class="main">
    <div class="scene" id="scene">
      <div class="window" id="card">
        <div class="titlebar">
          <div class="lights">
            <div class="light red"></div>
            <div class="light yellow" id="yellowLight"></div>
            <div class="light green"></div>
          </div>
          <span class="titlebar-label">jack r</span>
        </div>
        <div class="card-body">
          <div class="avatar">
            <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
              <circle cx="50" cy="36" r="22" fill="#888"/>
              <path d="M8 95 Q8 66 50 66 Q92 66 92 95" fill="#888"/>
            </svg>
          </div>
          <div class="info">
            <div class="name">jack r</div>
            <div class="meta">est. &mdash; mar 24, 2026</div>
          </div>
        </div>
        <div class="divider"></div>
        <div class="footer">
          <div class="footer-left">
            <div class="dot"></div>
            <span class="footer-text">online</span>
          </div>
          <div class="footer-right">
            <div class="footer-tag">loc <span>NJ, USA</span></div>
            <div class="footer-tag">status <span>STUDENT</span></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="credit">made with <span class="heart">&lt;3</span> by jack</div>

  <script src="/transitions.js" defer></script>
  <script>
    // ── YELLOW LIGHT TRIPLE CLICK → /authearth ──
    let yellowClicks = 0;
    let yellowTimer = null;
    document.getElementById('yellowLight').addEventListener('click', () => {
      yellowClicks++;
      clearTimeout(yellowTimer);
      yellowTimer = setTimeout(() => { yellowClicks = 0; }, 1200);
      if (yellowClicks >= 3) {
        yellowClicks = 0;
        window.location.href = '/authearth';
      }
    });

    // ── NAV BUBBLE ──
    const nav    = document.getElementById('nav');
    const bubble = document.getElementById('bubble');
    const items  = nav.querySelectorAll('.nav-item');

    function moveBubble(el) {
      const nr = nav.getBoundingClientRect();
      const er = el.getBoundingClientRect();
      bubble.style.left  = (er.left - nr.left) + 'px';
      bubble.style.width = er.width + 'px';
    }

    window.addEventListener('DOMContentLoaded', () => {
      const active = nav.querySelector('.nav-item.active');
      if (active) {
        bubble.style.transition = 'none';
        moveBubble(active);
        requestAnimationFrame(() => { bubble.style.transition = ''; });
      }
    });

    items.forEach(item => {
      item.addEventListener('mouseenter', () => moveBubble(item));
      item.addEventListener('mouseleave', () => {
        const active = nav.querySelector('.nav-item.active');
        if (active) moveBubble(active);
      });
    });

    // ── CARD TILT ──
    const scene = document.getElementById('scene');
    const card  = document.getElementById('card');
    const MAX = 18, EASE = 0.1;
    let tX = 0, tY = 0, cX = 0, cY = 0, over = false;

    scene.addEventListener('mousemove', e => {
      over = true;
      const r  = scene.getBoundingClientRect();
      const nx = ((e.clientX - r.left) / r.width)  * 2 - 1;
      const ny = ((e.clientY - r.top)  / r.height) * 2 - 1;
      tY =  nx * MAX; tX = -ny * MAX;
    });
    scene.addEventListener('mouseleave', () => { over = false; tX = 0; tY = 0; });

    (function tick() {
      cX += (tX - cX) * EASE;
      cY += (tY - cY) * EASE;
      card.style.transform = `rotateX(${cX}deg) rotateY(${cY}deg) scale(${over ? 1.03 : 1})`;
      requestAnimationFrame(tick);
    })();
  </script>
</body>
</html>
